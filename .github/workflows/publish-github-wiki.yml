name: Publish GitHub Wiki

on:
  push:
    branches:
      - "**"
    paths:
      - "wiki/**"
      - "scripts/export_github_wiki.py"
      - ".github/workflows/publish-github-wiki.yml"
  workflow_dispatch:

concurrency:
  group: publish-github-wiki
  cancel-in-progress: true

jobs:
  publish:
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Clone Wiki Repository
        env:
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_WIKI_TOKEN: ${{ secrets.GH_WIKI_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          TOKEN="${GH_WIKI_TOKEN:-$DEFAULT_TOKEN}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::No token available for wiki publishing."
            echo "::error::Use the default GITHUB_TOKEN or add a GH_WIKI_TOKEN secret with repository write access."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.wiki.git"
          if ! git clone "$WIKI_URL" /tmp/github-wiki; then
            echo "::error::Failed to clone ${REPOSITORY}.wiki.git."
            echo "::error::Enable Wiki in repository settings and create an initial wiki page once on GitHub before rerunning this workflow."
            exit 1
          fi

      - name: Export Wiki Pages
        env:
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python3 scripts/export_github_wiki.py \
            --repo-root . \
            --source-dir wiki \
            --output-dir /tmp/github-wiki \
            --repository "$REPOSITORY" \
            --ref "$REF_NAME"

      - name: Commit And Push Wiki Changes
        working-directory: /tmp/github-wiki
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git add --all
          git commit -m "docs: sync wiki from ${GITHUB_SHA}"
          git push origin HEAD
