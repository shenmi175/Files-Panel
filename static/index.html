<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Files Panel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel hero">
        <div>
          <p class="eyebrow">Rust + Docker</p>
          <h1>Ubuntu 资源与文件面板</h1>
          <p class="muted">
            支持 SSH 密码或私钥登录，提供基础资源查看、目录浏览和常用文件操作。
          </p>
        </div>
        <form id="server-form" class="server-form">
          <input name="name" placeholder="服务器名称" required />
          <input name="host" placeholder="IP / Host" required />
          <input name="port" type="number" placeholder="22" value="22" required />
          <input name="username" placeholder="ubuntu" required />
          <select id="auth-method" name="auth_method">
            <option value="password">密码登录</option>
            <option value="private_key">私钥登录</option>
          </select>
          <input id="password-input" name="password" type="password" placeholder="SSH 密码" />
          <input
            id="private-key-input"
            name="private_key_path"
            placeholder="/root/.ssh/id_rsa"
            class="hidden"
          />
          <button type="submit">添加服务器</button>
        </form>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="section-head">
            <h2>服务器</h2>
            <button id="refresh-servers" class="secondary">刷新</button>
          </div>
          <div id="servers" class="server-list"></div>
        </article>

        <article class="panel">
          <div class="section-head">
            <div>
              <h2>详情</h2>
              <p id="active-server" class="muted">尚未选择服务器</p>
            </div>
            <button id="test-connection" class="secondary">测试 SSH</button>
          </div>

          <div id="status" class="status hidden"></div>
          <div id="resources" class="cards empty">选择左侧服务器后加载资源信息</div>

          <div class="section-head files-head">
            <h3>文件</h3>
            <div class="path-bar">
              <input id="path-input" value="/" />
              <button id="load-files" class="secondary">浏览</button>
            </div>
          </div>

          <div class="toolbar">
            <input id="upload-input" type="file" />
            <button id="upload-button">上传到当前目录</button>
            <button id="rename-button" class="secondary">重命名所选</button>
            <button id="delete-button" class="secondary danger">删除所选</button>
            <button id="download-button" class="secondary">下载所选</button>
          </div>

          <div id="files" class="file-list empty">暂无目录内容</div>
        </article>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
